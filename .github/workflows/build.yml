name: Build Docker Image

on:
  push:
    branches:
      - 'main'
    tags: "*"

  pull_request:
    branches:
      - 'main'

  release:
    types:
      - created

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    permissions:
      contents: read
      packages: write
    with:
      tags: |
        type=ref,event=tag
